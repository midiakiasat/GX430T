name: GX430TiPhone

options:
  bundleIdPrefix: com.kaaffilm
  deploymentTarget:
    iOS: "17.0"

packages:
  GX430TKit:
    path: ../../shared/GX430TKit

targets:
  GX430TiPhone:
    type: application
    platform: iOS
    sources:
      - path: Sources
    resources:
      - path: Resources
    info:
      path: Resources/Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.kaaffilm.gx430t.iphone
        PRODUCT_NAME: GX430T
        SWIFT_VERSION: "6.0"
        TARGETED_DEVICE_FAMILY: "1"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""
        CURRENT_PROJECT_VERSION: "1"
        MARKETING_VERSION: "0.1.0"
        GENERATE_INFOPLIST_FILE: NO
        SUPPORTS_MACCATALYST: NO
    dependencies:
      - package: GX430TKit

  GX430TiPhoneTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests
    dependencies:
      - target: GX430TiPhone
